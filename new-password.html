<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nova senha</title>

  <link rel="stylesheet" href="./js/css/style.css">
</head>
<body>

<div class="card">

<h1>Nova senha</h1>
<p>Crie uma nova senha para sua conta</p>

<form id="newPasswordForm">

  <div class="input-password-wrap">
    <input 
      type="password" 
      id="password"
      placeholder="Nova senha"
      required
      autocomplete="new-password"
    >
    <button type="button" class="input-password-toggle" id="togglePasswordNew" aria-label="Mostrar senha" title="Mostrar senha">👁</button>
  </div>

  <div class="input-password-wrap">
    <input 
      type="password" 
      id="confirmPassword"
      placeholder="Confirmar nova senha"
      required
      autocomplete="new-password"
    >
    <button type="button" class="input-password-toggle" id="togglePasswordConfirmNew" aria-label="Mostrar senha" title="Mostrar senha">👁</button>
  </div>

  <button type="submit">
    Salvar nova senha
  </button>

</form>

<a href="./index.html">
  Voltar ao login
</a>

</div>

<script type="module"
src="./js/views/new-password.views.js">
</script>

</body>
</html>
